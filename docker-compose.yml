services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIRECTORY: /app/chroma_data
    depends_on:
      - redis
    volumes:
      - chroma_data:/app/chroma_data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
  chroma_data:
